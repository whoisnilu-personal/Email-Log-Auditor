<template>
    <section role="dialog" tabindex="-1" aria-modal="true"
             aria-label="Request Email Logs Now"
             class="slds-modal slds-fade-in-open">
        <div class="slds-modal__container">
            <!-- Header -->
            <header class="slds-modal__header">
                <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                        title="Close"
                        onclick={handleCancel}>
                    <lightning-icon icon-name="utility:close"
                                    alternative-text="close"
                                    variant="inverse"
                                    size="small"></lightning-icon>
                    <span class="slds-assistive-text">Close</span>
                </button>
                <h2 class="slds-modal__title slds-hyphenate">Request Email Logs Now</h2>
            </header>

            <!-- Body -->
            <div class="slds-modal__content slds-p-around_medium">

                <!-- Validation error -->
                <template if:true={validationError}>
                    <div data-id="validation-error" class="slds-notify slds-notify_alert slds-theme_error slds-m-bottom_small"
                         role="alert">
                        <lightning-icon icon-name="utility:error" alternative-text="error"
                                        variant="inverse" size="x-small"
                                        class="slds-m-right_small"></lightning-icon>
                        {validationError}
                    </div>
                </template>

                <div class="slds-grid slds-wrap slds-gutters_small">
                    <!-- Start date -->
                    <div class="slds-col slds-size_1-of-2">
                        <lightning-input
                            type="date"
                            label="Start Date"
                            data-field="startDate"
                            value={startDate}
                            onchange={handleStartDateChange}
                            required></lightning-input>
                    </div>
                    <!-- Start time -->
                    <div class="slds-col slds-size_1-of-2">
                        <lightning-input
                            type="time"
                            label="Start Time"
                            data-field="startTime"
                            value={startTime}
                            onchange={handleStartTimeChange}></lightning-input>
                    </div>
                    <!-- End date -->
                    <div class="slds-col slds-size_1-of-2">
                        <lightning-input
                            type="date"
                            label="End Date"
                            data-field="endDate"
                            value={endDate}
                            onchange={handleEndDateChange}
                            required></lightning-input>
                    </div>
                    <!-- End time -->
                    <div class="slds-col slds-size_1-of-2">
                        <lightning-input
                            type="time"
                            label="End Time"
                            data-field="endTime"
                            value={endTime}
                            onchange={handleEndTimeChange}></lightning-input>
                    </div>
                    <!-- Direction -->
                    <div class="slds-col slds-size_1-of-1 slds-m-top_small">
                        <lightning-combobox
                            label="Direction"
                            data-field="direction"
                            value={direction}
                            options={directionOptions}
                            onchange={handleDirectionChange}></lightning-combobox>
                    </div>
                    <!-- Optional email filter -->
                    <div class="slds-col slds-size_1-of-1 slds-m-top_small">
                        <lightning-input
                            type="text"
                            label="Email Filter (optional)"
                            data-field="emailFilter"
                            value={emailFilter}
                            placeholder="e.g. @example.com"
                            onchange={handleEmailFilterChange}></lightning-input>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <footer class="slds-modal__footer">
                <lightning-button
                    label="Cancel"
                    variant="neutral"
                    onclick={handleCancel}></lightning-button>
                <lightning-button
                    data-id="confirm-btn"
                    label="Submit Request"
                    variant="brand"
                    disabled={isConfirmDisabled}
                    onclick={handleConfirm}></lightning-button>
            </footer>
        </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
</template>
