<template>
    <div class="dashboard-shell">

        <!-- ═══ Premium Header ═══ -->
        <div class="dashboard-header">
            <div class="header-content">
                <div class="header-icon-wrap">
                    <svg class="header-icon-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22 6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1
                                 0 2-.9 2-2V6zm-2 0l-8 5-8-5h16zm0 12H4V8l8 5 8-5v10z"/>
                    </svg>
                </div>
                <div class="header-text">
                    <h1 class="header-title">Email Log Auditor</h1>
                    <p class="header-subtitle">Dashboard — Email delivery monitoring &amp; analytics</p>
                </div>
            </div>
            <div class="header-actions">
                <lightning-button
                    label="Download Now"
                    icon-name="utility:download"
                    variant="inverse"
                    disabled={isRunning}
                    onclick={handleDownloadNow}>
                </lightning-button>
            </div>
        </div>

        <!-- ═══ Dashboard Content ═══ -->
        <div class="dashboard-body">
            <lightning-tabset variant="scoped">
                <lightning-tab label="Overview" value="overview" icon-name="utility:chart">
                    <div class="tab-content">
                        <c-email-dashboard></c-email-dashboard>
                    </div>
                </lightning-tab>
                <lightning-tab label="Log Management" value="logs" icon-name="utility:table">
                    <div class="tab-content">
                        <c-log-management-panel></c-log-management-panel>
                    </div>
                </lightning-tab>
            </lightning-tabset>
        </div>

    </div>
</template>
